<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3efe8;
        --panel: #fffdf8;
        --line: rgba(28, 37, 31, 0.12);
        --text: #1f2420;
        --muted: #5a645c;
        --accent: #2f5f73;
      }
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background: radial-gradient(circle at top, #fff8ee 0, var(--bg) 55%);
        color: var(--text);
      }
      .shell {
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: 0 18px 60px rgba(20, 26, 22, 0.08);
        overflow: hidden;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 16px;
        padding: 24px 28px 18px;
        border-bottom: 1px solid var(--line);
      }
      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.2;
      }
      .meta {
        color: var(--muted);
        font-size: 14px;
      }
      .content {
        padding: 24px 28px 28px;
      }
      pre {
        margin: 0;
        padding: 20px;
        background: #f7f4ee;
        border-radius: 18px;
        border: 1px solid var(--line);
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .empty {
        color: var(--muted);
        padding: 8px 0 0;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(47, 95, 115, 0.1);
        color: var(--accent);
        font-size: 13px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <header class="header">
          <div>
            <div class="badge">本地 Review</div>
            <h1>{{ title }}</h1>
            <div class="meta">workspace: {{ workspace_dir }}</div>
          </div>
          <div class="meta">仅用于确认候选病情结构</div>
        </header>
        <div class="content">
          {% if candidate_json %}
            <pre>{{ candidate_json }}</pre>
          {% else %}
            <div class="empty">当前 workspace 中还没有 `candidate_case.json`。</div>
          {% endif %}
        </div>
      </section>
    </main>
  </body>
</html>
